{% extends "base.html" %}
{% block title %}Create Account — MyStore{% endblock %}

{% block content %}

  <div class="form-card">
    <div class="card">
      <div class="card-section">
        <p class="card-title">Create Account</p>

        <form method="POST">
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" required>
          </div>
          <button class="btn btn-primary btn-full" type="submit">Create Account</button>
        </form>
      </div>
      <div class="card-section text-muted">
        Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
      </div>
    </div>
  </div>

{% endblock %}
