{% extends "base.html" %}
{% block title %}Log In — MyStore{% endblock %}

{% block content %}

  <div class="form-card">
    <div class="card">
      <div class="card-section">
        <p class="card-title">Log In</p>

        <form method="POST">
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" required>
          </div>
          <button class="btn btn-primary btn-full" type="submit">Log In</button>
        </form>
      </div>
      <div class="card-section text-muted">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
      </div>
    </div>
  </div>

{% endblock %}
