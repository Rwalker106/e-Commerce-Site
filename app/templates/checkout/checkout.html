{% extends "base.html" %}
{% block title %}Checkout — MyStore{% endblock %}

{% block content %}

  <div class="page-header">
    <h1>Checkout</h1>
  </div>

  <div class="checkout-layout">

    <!-- Shipping form -->
    <div class="card">
      <div class="card-section">
        <p class="card-title">Shipping Details</p>
        <form method="POST">

          <div class="form-group">
            <label for="name">Full Name</label>
            <input class="form-control" type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" name="email"
                   value="{{ current_user.email if current_user.is_authenticated else '' }}"
                   required>
          </div>

          <div class="form-group">
            <label for="address">Street Address</label>
            <input class="form-control" type="text" id="address" name="address" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input class="form-control" type="text" id="city" name="city" required>
            </div>
            <div class="form-group">
              <label for="state">State</label>
              <input class="form-control" type="text" id="state" name="state" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="zip">ZIP Code</label>
              <input class="form-control" type="text" id="zip" name="zip" required>
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <input class="form-control" type="text" id="country" name="country"
                     value="US" required>
            </div>
          </div>

          <button class="btn btn-primary btn-full" type="submit">Continue to Payment</button>
        </form>
      </div>
    </div>

    <!-- Order summary -->
    <div class="card">
      <div class="card-section">
        <p class="card-title">Order Summary</p>
        {% for item in items %}
          <div class="total-row">
            <span>{{ item.product.name }} &times; {{ item.quantity }}</span>
            <span>${{ '%.2f' % (item.line_total / 100) }}</span>
          </div>
        {% endfor %}
        <div class="total-row grand">
          <span>Total</span>
          <span>{{ total }}</span>
        </div>
      </div>
    </div>

  </div>

{% endblock %}
