{% extends "base.html" %}
{% block title %}Payment — MyStore{% endblock %}

{% block content %}

  <div class="payment-wrap">
    <div class="page-header">
      <h1>Payment</h1>
    </div>

    <div class="card mb-2">
      <div class="card-section">
        <p class="card-title">Order Total</p>
        <div class="total-row">
          <span>Subtotal</span>
          <span>${{ '%.2f' % (subtotal / 100) }}</span>
        </div>
        <div class="total-row">
          <span>Tax</span>
          <span>${{ '%.2f' % (tax / 100) }}</span>
        </div>
        <div class="total-row grand">
          <span>Total</span>
          <span>${{ '%.2f' % (total / 100) }}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-section">
        <p class="card-title">Card Details</p>
        <div id="payment-element"></div>
        <div id="error-message"></div>
        <button class="btn btn-primary btn-full mt-2" id="submit-btn" type="button">
          Pay ${{ '%.2f' % (total / 100) }}
        </button>
      </div>
    </div>
  </div>

  <script src="https://js.stripe.com/v3/"></script>
  <script>
    const stripe = Stripe('{{ stripe_public_key }}');
    const elements = stripe.elements({ clientSecret: '{{ client_secret }}' });
    const paymentElement = elements.create('payment');
    paymentElement.mount('#payment-element');

    document.getElementById('submit-btn').addEventListener('click', async () => {
      const { error } = await stripe.confirmPayment({
        elements,
        confirmParams: {
          return_url: '{{ url_for("checkout.confirm", _external=True) }}'
        }
      });
      if (error) {
        document.getElementById('error-message').textContent = error.message;
      }
    });
  </script>

{% endblock %}
